<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신조선 관리자 페이지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <header class="admin-header">
    <div class="header-inner">
      <h1>신조선 관리자센터</h1>
      <div class="header-actions">
        <span id="admin-user-label"></span>
        <a href="index.html">홈페이지 보기</a>
        <button type="button" class="logout-btn">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <section class="stats-grid">
      <article class="stat-card">
        <h2>오늘 접속자</h2>
        <p class="value" id="today-visits-count">0</p>
        <span class="delta" id="today-visits-delta">실시간</span>
      </article>
      <article class="stat-card">
        <h2>신규 가입</h2>
        <p class="value" id="new-users-count">0</p>
        <span class="delta" id="new-users-delta">오늘 기준</span>
      </article>
      <article class="stat-card">
        <h2>미처리 문의</h2>
        <p class="value" id="pending-inquiry-count">0</p>
        <span class="delta" id="pending-inquiry-delta">대기중</span>
      </article>
      <article class="stat-card">
        <h2>신고 게시글</h2>
        <p class="value" id="open-report-count">0</p>
        <span class="delta" id="open-report-delta">검토 필요</span>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>공지사항 작성</h2>
      </div>
      <form class="notice-form" action="#" method="get">
        <label for="notice-title">제목</label>
        <input id="notice-title" name="title" type="text" placeholder="예: 5월 1주차 점검 안내" required />

        <label for="notice-type">분류</label>
        <select id="notice-type" name="type">
          <option>점검</option>
          <option>업데이트</option>
          <option>이벤트</option>
          <option>운영정책</option>
        </select>

        <label for="notice-body">내용</label>
        <textarea id="notice-body" name="body" rows="6" placeholder="공지 내용을 입력하세요." required></textarea>

        <div class="form-actions">
          <button type="submit">공지 등록</button>
          <p class="form-note" aria-live="polite"></p>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>게시판 관리</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>게시판</th>
              <th>제목</th>
              <th>작성자</th>
              <th>상태</th>
              <th>처리</th>
            </tr>
          </thead>
          <tbody id="admin-board-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>회원 관리</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>계정명</th>
              <th>닉네임</th>
              <th>이메일</th>
              <th>권한</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="admin-user-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>사전이벤트 지원자 목록</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>이메일</th>
              <th>연락처</th>
              <th>접수일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="admin-prereg-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/auth-store.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
