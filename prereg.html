<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신조선 사전이벤트 접수</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card signup-select">
      <a class="back-home" href="index.html">홈으로 돌아가기</a>
      <h1 class="page-title">사전이벤트 접수</h1>
      <p class="page-subtitle">이메일, 이름, 연락처를 남기면 출시 소식을 보내드립니다.</p>

      <form id="prereg-form" class="signup-form-detail">
        <label for="prereg-name">이름</label>
        <input id="prereg-name" name="name" type="text" required placeholder="이름 입력" />

        <label for="prereg-email-id">이메일</label>
        <div class="email-field">
          <input id="prereg-email-id" name="emailId" type="text" required placeholder="이메일 아이디" />
          <span>@</span>
          <select id="prereg-email-domain" name="emailDomain">
            <option value="naver.com">naver.com</option>
            <option value="gmail.com">gmail.com</option>
            <option value="daum.net">daum.net</option>
            <option value="kakao.com">kakao.com</option>
            <option value="nate.com">nate.com</option>
            <option value="direct">직접입력</option>
          </select>
        </div>
        <input id="prereg-email-domain-direct" name="emailDomainDirect" type="text" placeholder="도메인 직접입력 (예: mydomain.com)" style="display:none;" />

        <label for="prereg-phone">연락처</label>
        <input id="prereg-phone" name="phone" type="tel" required placeholder="01012345678" />

        <button type="submit" class="primary-btn">접수하기</button>
      </form>
      <p id="prereg-note" class="auth-note" aria-live="polite"></p>
    </section>
  </main>

  <script src="js/auth-store.js"></script>
  <script src="js/prereg.js"></script>
</body>
</html>
