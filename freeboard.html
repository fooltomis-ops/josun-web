<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신조선 자유게시판</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <header class="site-header">
    <div class="topbar">
      <div class="topbar-left">
        <button type="button" class="menu-icon" aria-label="전체 메뉴">☰</button>
        <a class="logo" href="index.html">신<span>조선</span></a>
      </div>
      <form class="quick-auth" action="#" method="get">
        <a href="signup.html">회원가입</a>
        <input type="text" name="userId" placeholder="계정명" aria-label="계정명" />
        <input type="password" name="password" placeholder="비밀번호" aria-label="비밀번호" />
        <button type="submit">로그인</button>
        <a href="recover.html">계정찾기</a>
        <a href="recover.html">비번찾기</a>
        <a href="account.html">내계정</a>
      </form>
    </div>
    <div class="menubar">
      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav">
        <span class="sr-only">메뉴</span>
        <span></span><span></span><span></span>
      </button>
      <nav id="site-nav" class="site-nav">
        <a href="notice.html">공지사항</a>
        <a href="#" onclick="return false;">자유게시판</a>
        <a href="#">가이드</a>
        <a href="#">고객지원</a>
      </nav>
    </div>
    <div class="subbar">
      <a href="#">사전예약</a>
      <a href="#">쿠폰등록</a>
      <a href="#">이벤트</a>
    </div>
  </header>

  <main id="top">
    <section class="hero" style="min-height: 52vh;">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="hero-inner">
        <div class="hero-content">
          <p class="hero-tag">FREE BOARD</p>
          <h1>자유게시판</h1>
          <p class="hero-lead">자유롭게 글을 작성하고 바로 목록에서 확인할 수 있습니다.</p>
          <div class="board-grid" style="grid-template-columns: 1fr; width: min(900px, 100%);">
            <article id="community" class="board-card">
              <div class="board-head">
                <h3>자유게시판</h3>
                <a href="#" id="free-clear-btn">전체 초기화</a>
              </div>
              <p id="free-auth-note" class="board-empty"></p>
              <form class="board-form" id="free-form">
                <input type="text" name="author" placeholder="작성자" required />
                <input type="text" name="title" placeholder="제목을 입력하세요" required />
                <button type="submit">글 등록</button>
              </form>
              <ul class="board-list" id="free-list"></ul>
              <p class="board-empty" id="free-empty">아직 작성된 글이 없습니다.</p>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">© 2026 신조선. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">회사소개</a>
        <a href="#">이용약관</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">운영정책</a>
        <a href="#">고객지원</a>
        <a href="#">게임이용등급: 청소년이용불가</a>
      </div>
    </div>
  </footer>

  <script src="js/auth-store.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
